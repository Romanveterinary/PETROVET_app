name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Використовуємо 3.10 для кращої сумісності з Flet CLI

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Accept Licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Fix Python Environment
        # Цей крок прибирає помилку 'unicode is not defined'
        run: |
          pip install --upgrade pip setuptools wheel
          pip install flet==0.26.0 # Стабільна версія для Android-збірок
          pip install google-generativeai Pillow

      - name: Build APK
        env:
          PYTHONIOENCODING: "utf-8"
          PYTHONPATH: "."
        run: flet build apk --verbose
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-V49-STABLE
          path: build/apk/**/*.apk
