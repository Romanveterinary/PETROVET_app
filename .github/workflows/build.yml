name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Налаштування Java (Для Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Налаштування офіційного Flutter (З ліцензіями)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Налаштування Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Встановлення СТАБІЛЬНОЇ версії Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.25.2

      - name: Збірка додатку
        run: flet build apk

      - name: Збереження готового APK
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
