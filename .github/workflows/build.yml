name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Fix Environment & Licenses
        # Вирішуємо проблему зі скріншота 936
        run: |
          pip install --upgrade pip setuptools wheel
          yes | flutter doctor --android-licenses || true

      - name: Install Flet
        run: pip install flet==0.27.3

      - name: Build APK (Bypass Unicode Error)
        # Вирішуємо проблему зі скріншотів 936 та 938
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: flet build apk --verbose
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-BIZ-CONSULTANT
          path: build/apk/**/*.apk
