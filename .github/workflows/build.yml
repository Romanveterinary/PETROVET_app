name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Force Accept Licenses
        # Вирішує проблему зависання на кроці ліцензій
        run: |
          yes | flutter doctor --android-licenses || true
          mkdir -p ${ANDROID_HOME}/licenses
          echo -e "\n8933bad161affd0fb5b1744237198a28906322b2" > ${ANDROID_HOME}/licenses/android-sdk-license

      - name: Install Dependencies
        run: |
          pip install flet==0.28.3
          echo "flet==0.28.3" > requirements.txt
          echo "google-generativeai" >> requirements.txt
          echo "Pillow" >> requirements.txt

      - name: Build APK
        env:
          PYTHONWARNINGS: "ignore" # Фікс для помилки 'unicode'
          TERM: "dumb"
        run: flet build apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-STABLE-APK
          path: build/apk/**/*.apk
