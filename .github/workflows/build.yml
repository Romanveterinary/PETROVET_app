name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Налаштування Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Встановлення бібліотек Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev mesa-utils

      - name: Налаштування Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Встановлення Android Studio (Для 100% зеленого Flutter Doctor)
        run: |
          wget https://redirector.gvt1.com/edgedl/android/studio/ide-zips/2024.1.1.12/android-studio-2024.1.1.12-linux.tar.gz
          tar -xzf android-studio-2024.1.1.12-linux.tar.gz
          sudo mv android-studio /usr/local/
          echo 'export PATH=$PATH:/usr/local/android-studio/bin' >> $GITHUB_ENV

      - name: Налаштування СТАБІЛЬНОГО Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Вказуємо шлях до Android Studio для Flutter
        run: flutter config --android-studio-dir=/usr/local/android-studio

      - name: Прийняття ліцензій Android
        run: yes | flutter doctor --android-licenses

      - name: Встановлення СТАБІЛЬНОГО Flet
        run: pip install flet==0.28.3

      - name: Підготовка конфігурації
        run: |
          rm -f requirements.txt flet.toml flet_config.toml
          echo "flet==0.28.3" > requirements.txt
          echo "[app]" > flet.toml
          echo 'id = "com.petrovet.app"' >> flet.toml
          echo 'name = "petrovetapp"' >> flet.toml
          echo 'description = "vet inspector"' >> flet.toml

      - name: Збірка APK
        env:
          PYTHONIOENCODING: "utf-8"
          PYTHONUTF8: "1"
          LANG: "C.UTF-8"
        run: flet build apk

      - name: Збереження готового додатку
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
