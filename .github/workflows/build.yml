name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true # Додаємо кеш, щоб пришвидшити наступні спроби

      - name: Pre-accept Licenses & Clean Doctor
        # Виконуємо це окремо, щоб flet build не бачив цих повідомлень
        run: |
          yes | sdkmanager --licenses || true
          flutter doctor --android-licenses || true
          flutter doctor # Проганяємо заздалегідь, щоб кешувати результати

      - name: Install Flet & Tools
        run: |
          pip install flet==0.28.3
          echo "flet==0.28.3" > requirements.txt
          echo "google-generativeai" >> requirements.txt

      - name: Build APK (Nuclear Option)
        env:
          PYTHONWARNINGS: "ignore"
          PYTHONIOENCODING: "utf-8"
          # Змушуємо консоль бути "тупою", без кольорів та спецсимволів
          TERM: "dumb"
          NO_COLOR: "1"
        run: flet build apk --verbose
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
