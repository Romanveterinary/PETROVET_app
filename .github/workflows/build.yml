name: Build PETROVET APK
on: 
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: |
          # Ця команда знайде файл, де б він не був, і запустить збірку
          FILE_PATH=$(find . -name "main.py" -print -quit)
          echo "Found main.py at: $FILE_PATH"
          flet build apk "$FILE_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: petrovet-app-package
          path: build/apk/*.apk
