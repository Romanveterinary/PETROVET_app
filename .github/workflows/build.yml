name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Налаштування Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Блокування багу (Створюємо файл вимог вручну)
        run: |
          rm -f README.md flet_config.toml requirements.txt
          echo "flet" > requirements.txt
          echo "[app]" > flet.toml
          echo 'id = "com.petrovet.app"' >> flet.toml
          echo 'name = "petrovetapp"' >> flet.toml
          echo 'description = "vet inspector"' >> flet.toml

      - name: Встановлення Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Збірка Android додатку (З автоматичною згодою)
        run: yes | flet build apk

      - name: Збереження готового файлу APK
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
