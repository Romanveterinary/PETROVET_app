name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 25 # Якщо за 25 хв не зібралося — скасовуємо автоматично
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3' # Суворо дотримуємось лімітів
          channel: 'stable'

      - name: Force Accept Android Licenses
        # Це найважливіше — кажемо "так" на всі ліцензії заздалегідь
        run: |
          yes | sdkmanager --licenses || true
          flutter doctor --android-licenses || true

      - name: Install Dependencies
        run: |
          pip install flet==0.28.3
          echo "flet==0.28.3" > requirements.txt
          echo "google-generativeai" >> requirements.txt
          echo "Pillow" >> requirements.txt

      - name: Build APK (Silent Terminal)
        env:
          PYTHONWARNINGS: "ignore"
          # Вимикаємо "красиву" консоль, на якій вішається старий Flet
          TERM: "dumb"
          NO_COLOR: "1"
        run: flet build apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-FINAL-APK
          path: build/apk/**/*.apk
