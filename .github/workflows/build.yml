name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Налаштування Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Налаштування СТАБІЛЬНОГО Flutter (З вашого робочого проекту)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Встановлення СТАБІЛЬНОГО Flet
        run: pip install flet==0.28.3

      - name: Підготовка конфігурації (Без багів)
        run: |
          rm -f requirements.txt flet.toml flet_config.toml
          echo "flet==0.28.3" > requirements.txt
          echo "[app]" > flet.toml
          echo 'id = "com.petrovet.app"' >> flet.toml
          echo 'name = "petrovetapp"' >> flet.toml
          echo 'description = "vet inspector"' >> flet.toml

      - name: Збірка APK
        run: flet build apk

      - name: Збереження готового додатку
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
