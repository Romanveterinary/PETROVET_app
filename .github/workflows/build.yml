name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 25 # Авто-скасування при зависанні
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3' # Фіксована версія
          channel: 'stable'

      - name: Pre-accept Android Licenses
        # Вирішує проблему "Some Android licenses not accepted"
        run: |
          yes | sdkmanager --licenses || true
          flutter doctor --android-licenses || true

      - name: Install Dependencies
        run: |
          pip install flet==0.28.3
          echo "flet==0.28.3" > requirements.txt
          echo "google-generativeai" >> requirements.txt
          echo "Pillow" >> requirements.txt

      - name: Build APK (Silent Mode)
        env:
          PYTHONWARNINGS: "ignore" # Рятує від помилки 'unicode'
          TERM: "dumb" # Прибирає спецсимволи з консолі
        run: flet build apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-V49-APK
          path: build/apk/**/*.apk
