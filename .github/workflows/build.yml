name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-20.04 # Максимальна стабільність для шаблонів
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9' # Версія, де найменше проблем з кодуванням

      - name: System Sterilization
        # Примусово налаштовуємо UTF-8 на рівні системи
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen en_US.UTF-8
          pip install --upgrade pip setuptools wheel

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0' # Перевірена пара для Flet 0.21.2
          channel: 'stable'

      - name: Install Flet
        # Використовуємо версію 0.21.2 як найбільш стійку до багів unicode
        run: pip install flet==0.21.2 google-generativeai Pillow

      - name: Build APK (Shield Mode)
        env:
          LANG: "en_US.UTF-8"
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        # Пропускаємо ліцензії та запускаємо чисту збірку
        run: |
          yes | flutter doctor --android-licenses || true
          flet build apk --verbose
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-PROFIT-GUIDE
          path: build/apk/**/*.apk
