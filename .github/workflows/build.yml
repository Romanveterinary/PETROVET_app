name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet CLI
        run: |
          pip install --upgrade pip
          pip install flet==0.23.2 # Стабільна версія

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Force Android Licenses
        # Цей крок прибирає помилку з твого скріншоту 936
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Build APK
        env:
          # Ці прапори вбивають помилку 'unicode'
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: flet build apk --verbose
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-STABLE
          path: build/apk/**/*.apk
