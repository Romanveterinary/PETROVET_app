name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Налаштування Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Встановлення чистих інструментів
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Жорстка збірка додатку (Без кирилиці для сервера)
        run: flet build apk --project-name petrovetapp --description "vetinspector" --org "com.petrovet"

      - name: Збереження готового APK
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
