name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Очищення конфліктних файлів
        run: |
          rm -f README.md requirements.txt flet_config.toml
          echo '[app]' > flet.toml
          echo 'id = "com.petrovet.app"' >> flet.toml
          echo 'name = "petrovetapp"' >> flet.toml
          echo 'description = "vet inspector"' >> flet.toml

      - name: Встановлення бібліотек Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev mesa-utils

      - name: Налаштування Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Налаштування Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Авто-прийняття ліцензій Android
        run: yes | flutter doctor --android-licenses

      - name: Налаштування Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Глобальний патч Python (Анти-Unicode Баг)
        run: |
          python -c "import site; open(site.getsitepackages()[0] + '/sitecustomize.py', 'w').write('import builtins\nbuiltins.unicode = str\n')"

      - name: Встановлення чистого пакувальника
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.31.0
          pip install flet

      - name: Збірка додатку
        run: flet build apk

      - name: Збереження готового APK
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
