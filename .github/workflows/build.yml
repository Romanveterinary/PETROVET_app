name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Очищення від кирилиці та створення flet.toml
        run: |
          rm -f README.md requirements.txt flet_config.toml
          echo '[app]' > flet.toml
          echo 'id = "com.petrovet.app"' >> flet.toml
          echo 'name = "petrovetapp"' >> flet.toml
          echo 'description = "vet inspector"' >> flet.toml

      - name: Налаштування Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Налаштування Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Налаштування ліцензій Android
        run: yes | flutter doctor --android-licenses

      - name: Налаштування Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Встановлення найновішого Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Збірка додатку (Детальний режим)
        run: flet build apk --verbose

      - name: Збереження готового APK
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
