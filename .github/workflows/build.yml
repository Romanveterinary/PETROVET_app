name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Налаштування Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Встановлення бібліотек Linux
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev mesa-utils

      - name: Налаштування Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Налаштування СТАБІЛЬНОГО Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Прийняття ліцензій Android
        run: yes | flutter doctor --android-licenses

      - name: Встановлення СТАБІЛЬНОГО Flet та Оновлення Модулів
        run: |
          python -m pip install --upgrade pip
          pip install urllib3==1.26.18 requests==2.31.0 chardet==5.2.0 charset-normalizer==3.3.2
          pip install flet==0.28.3

      - name: Вбивця Багів (Патч для Unicode в ядрі)
        run: |
          cat << 'EOF' > patch.py
          import site, os
          path = os.path.join(site.getsitepackages()[0], 'sitecustomize.py')
          with open(path, 'w') as f:
              f.write("import builtins\n")
              f.write("import sys\n")
              f.write("builtins.unicode = str\n")
          EOF
          python patch.py

      - name: Підготовка конфігурації
        run: |
          rm -f requirements.txt flet.toml flet_config.toml
          echo "flet==0.28.3" > requirements.txt
          echo "[app]" > flet.toml
          echo 'id = "com.petrovet.app"' >> flet.toml
          echo 'name = "petrovetapp"' >> flet.toml
          echo 'description = "vet inspector"' >> flet.toml

      - name: Збірка APK
        env:
          PYTHONIOENCODING: "utf-8"
          PYTHONUTF8: "1"
          LANG: "C.UTF-8"
        run: flet build apk

      - name: Збереження готового додатку
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
