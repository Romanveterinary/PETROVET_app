name: Build PETROVET APK
on: 
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Fix Path and Build
        run: |
          # Знаходимо main.py і копіюємо його в корінь, якщо він не там
          TARGET_FILE=$(find . -name "main.py" -print -quit)
          if [ "$TARGET_FILE" != "./main.py" ]; then
            cp "$TARGET_FILE" ./main.py
          fi
          # Запускаємо збірку з кореня
          flet build apk main.py

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: petrovet-app-package
          path: build/apk/*.apk
