name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3' # СУВОРО ЦЯ ВЕРСІЯ
          channel: 'stable'

      - name: Pre-accept Licenses
        # Це прибере запити на підтвердження, які "вішають" збірку
        run: |
          yes | sdkmanager --licenses || true
          flutter doctor --android-licenses || true

      - name: Install dependencies
        run: |
          pip install flet==0.28.3
          echo "flet==0.28.3" > requirements.txt
          echo "google-generativeai" >> requirements.txt

      - name: Build APK (Silent Terminal Mode)
        env:
          PYTHONWARNINGS: "ignore"
          PYTHONIOENCODING: "utf-8"
          # ТЕРМІНАЛ "DUMB" ПРИБИРАЄ КОЛЬОРИ ТА АНІМАЦІЇ (Рятує від помилки unicode)
          TERM: "dumb"
          NO_COLOR: "1"
        run: flet build apk
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
