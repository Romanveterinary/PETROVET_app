name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3' # Використовуємо стабільну версію
          channel: 'stable'

      - name: Pre-build Environment Fix
        # Цей крок примусово налаштовує систему на сучасну мову UTF-8
        run: |
          sudo locale-gen en_US.UTF-8
          sudo update-locale LANG=en_US.UTF-8
          yes | flutter doctor --android-licenses || true

      - name: Install Dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install flet==0.27.3 # Використовуємо версію, де цей баг було виправлено
          pip install google-generativeai Pillow

      - name: Build APK
        env:
          # Ці три рядки — наш "дезінфектор" від помилки unicode
          LANG: en_US.UTF-8
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: flet build apk --verbose
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-V49-READY
          path: build/apk/**/*.apk
