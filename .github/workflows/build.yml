name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Очищення конфліктних файлів
        run: |
          rm -f README.md flet_config.toml requirements.txt
          echo "flet" > requirements.txt
          echo "[app]" > flet.toml
          echo 'id = "com.petrovet.app"' >> flet.toml
          echo 'name = "petrovetapp"' >> flet.toml
          echo 'description = "vet inspector"' >> flet.toml

      - name: Встановлення бібліотек Linux (Для успішного тесту системи)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev mesa-utils

      - name: Налаштування Java 17 (Для Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Налаштування Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Глобальне оновлення модулів (Вбиваємо баг Unicode)
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade requests urllib3 chardet charset-normalizer
          pip install flet

      - name: Збірка Android додатку (Примусовий UTF-8 + Автозгода)
        env:
          PYTHONIOENCODING: "utf-8"
          PYTHONUTF8: "1"
        run: yes | flet build apk

      - name: Збереження готового файлу APK
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
