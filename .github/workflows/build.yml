name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30 # Даємо трохи більше часу на випадок повільного завантаження SDK
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Accept Android Licenses (Fixed)
        # Використовуємо flutter doctor, оскільки sdkmanager може бути недоступний у PATH
        run: |
          yes | flutter doctor --android-licenses || true
          # Про всяк випадок пробуємо шлях за замовчуванням для Android SDK
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Dependencies
        run: |
          pip install flet==0.28.3
          echo "flet==0.28.3" > requirements.txt
          echo "google-generativeai" >> requirements.txt
          echo "Pillow" >> requirements.txt

      - name: Build APK (Silent Mode)
        env:
          PYTHONWARNINGS: "ignore" # Рятує від краху 'unicode' при виводі консолі
          TERM: "dumb" # Вимикає анімації прогрес-барів, які вішають збірку
          NO_COLOR: "1"
        run: flet build apk
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-V49-APK
          path: build/apk/**/*.apk
