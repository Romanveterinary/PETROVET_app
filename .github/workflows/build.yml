name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04 # Стабільна ОС для пакування
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: System Locale Fix
        # Примусове налаштування мови системи, щоб уникнути помилки unicode
        run: |
          sudo locale-gen en_US.UTF-8
          sudo update-locale LANG=en_US.UTF-8
          yes | flutter doctor --android-licenses || true

      - name: Install Dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install flet==0.23.2 # Версія з виправленим бутстрапом
          pip install google-generativeai Pillow

      - name: Build APK (Force UTF-8)
        env:
          # Ці змінні — наш головний захист
          LANG: "en_US.UTF-8"
          LC_ALL: "en_US.UTF-8"
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: flet build apk --verbose
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-BIZ-ANALYTICS
          path: build/apk/**/*.apk
