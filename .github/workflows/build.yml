name: Build PETROVET APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: |
          # Вказуємо шлях до SDK та приймаємо ліцензії
          yes | flutter doctor --android-licenses
          
          # Запускаємо збірку з явним вказанням модуля
          flet build apk --module-name main
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: petrovet-app-package
          path: build/apk/*.apk
