name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04 # Змінюємо на стабільну 22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9' # Використовуємо 3.9 для кращої сумісності

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Стабільна версія для Flet
          channel: 'stable'

      - name: Force Accept Licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Dependencies
        run: |
          pip install flet==0.21.2 # Використовуємо перевірену версію
          pip install google-generativeai Pillow

      - name: Build APK
        env:
          PYTHONUTF8: "1" # Критично важливий прапор
          PYTHONIOENCODING: "utf-8"
        run: flet build apk --verbose
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-STABLE-APK
          path: build/apk/**/*.apk
