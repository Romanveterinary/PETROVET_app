name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-20.04 # Стабільна ОС без конфліктів кодування
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Fix System Environment
        # Примусово налаштовуємо чисте середовище UTF-8
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen en_US.UTF-8
          pip install --upgrade pip setuptools wheel

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0' # Перевірена версія для Android
          channel: 'stable'

      - name: Install Flet
        # Версія 0.21.2 - найбільш стійка до помилок unicode
        run: pip install flet==0.21.2 google-generativeai Pillow

      - name: Build APK (Bypass Unicode Error)
        env:
          LANG: "en_US.UTF-8"
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          yes | flutter doctor --android-licenses || true
          flet build apk --verbose
        
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PETROVET-MENTOR-READY
          path: build/apk/**/*.apk
