name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Вказуємо конкретну версію, щоб уникнути 3.29.2
          flutter-version: '3.24.3' 
          channel: 'stable'

      - name: Accept Android Licenses
        # Це прибере попередження, яке викликає помилку 'unicode'
        run: yes | sdkmanager --licenses || true

      - name: Install Flet
        run: |
          pip install flet==0.28.3
          echo "flet==0.28.3" > requirements.txt
          echo "google-generativeai" >> requirements.txt

      - name: Build APK (БЕЗ КОНСОЛЬНОГО СМІТТЯ)
        env:
          PYTHONWARNINGS: "ignore"
          # Додаємо примусове ігнорування кодування в терміналі
          PYTHONIOENCODING: "utf-8"
        run: flet build apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VET-INSPECTOR-APP
          path: build/apk/**/*.apk
